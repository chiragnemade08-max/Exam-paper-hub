    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* CONTAINER */
.container {
    animation: fade 2s ease-in;
}

/* TITLE */
h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

/* TEXT */
p {
    font-size: 18px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: white;
    color: #333;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: gold;
}

/* LOADER */
.loader {
    margin: 20px auto;
    border: 5px solid rgba(255,255,255,0.3);
    border-top: 5px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

/* ANIMATIONS */
@keyframes spin {
    100% { transform: rotate(360deg); }
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
